name: Deploy Tapinti Website to VPS

on:
  push:
    branches:
      - main
    paths:
      - "website.tapinti/**"
      - ".github/workflows/deploy-website-tapinti.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: estamedi/website.tapinti

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Tapinti website image
        uses: docker/build-push-action@v6
        with:
          context: ./website.tapinti
          file: ./website.tapinti/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Create deployment package
        run: |
          mkdir -p deploy/website.tapinti
          cp website.tapinti/docker-compose.yml deploy/website.tapinti/docker-compose.yml
          cp website.tapinti/.env.example deploy/website.tapinti/.env.example
          tar -czf website-tapinti.tar.gz -C deploy website.tapinti/

          ls -lh website-tapinti.tar.gz

      - name: Copy website package to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "website-tapinti.tar.gz"
          target: "/tmp/"

      - name: Deploy website on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

            mkdir -p /opt/jobhunter

            rm -rf /opt/jobhunter/website.tapinti.previous
            if [ -d /opt/jobhunter/website.tapinti ]; then
              cp -a /opt/jobhunter/website.tapinti /opt/jobhunter/website.tapinti.previous
            fi

            rm -rf /opt/jobhunter/website.tapinti
            tar -xzf /tmp/website-tapinti.tar.gz -C /opt/jobhunter

            if [ -f /opt/jobhunter/website.tapinti.previous/.env ]; then
              cp /opt/jobhunter/website.tapinti.previous/.env /opt/jobhunter/website.tapinti/.env
            fi

            cd /opt/jobhunter/website.tapinti

            if [ ! -f .env ] && [ -f .env.example ]; then
              cp .env.example .env
            fi

            tmp_env="$(mktemp)"
            if [ -f .env ]; then
              while IFS= read -r line || [ -n "$line" ]; do
                case "$line" in
                  TAPINTI_SITE_IMAGE=*) ;;
                  *) printf '%s\n' "$line" >> "$tmp_env" ;;
                esac
              done < .env
            fi
            printf 'TAPINTI_SITE_IMAGE=%s\n' "$IMAGE" >> "$tmp_env"
            mv "$tmp_env" .env

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            echo "Deploying Tapinti website..."
            docker compose pull tapinti-site
            docker compose up -d --no-build

            echo "Waiting for Tapinti website to become healthy..."
            for attempt in $(seq 1 12); do
              if docker compose exec -T tapinti-site node -e "fetch('http://127.0.0.1:3000/en').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; then
                echo "Tapinti website is healthy"
                rm -f /tmp/website-tapinti.tar.gz
                rm -rf /opt/jobhunter/website.tapinti.previous
                docker image prune -f
                exit 0
              fi

              echo "Health check attempt ${attempt}/12 failed; retrying..."
              sleep 5
            done

            docker compose logs --tail=100 tapinti-site
            exit 1

      - name: Deployment summary
        if: success()
        run: |
          echo "Tapinti website deployed successfully to VPS"
          echo "Website port: ${{ secrets.VPS_HOST }}:${TAPINTI_SITE_PORT:-3000}"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Deployment failed. Attempting to restart the previous Tapinti website container..."
            if [ -d /opt/jobhunter/website.tapinti.previous ]; then
              rm -rf /opt/jobhunter/website.tapinti
              mv /opt/jobhunter/website.tapinti.previous /opt/jobhunter/website.tapinti
              cd /opt/jobhunter/website.tapinti
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
              docker compose pull tapinti-site || true
              docker compose up -d --no-build
            else
              echo "No previous Tapinti website deployment found."
            fi
