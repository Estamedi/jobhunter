services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-jobhunterdb}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-jobhunterdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend.jobhunter
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__backend-jobhunterDb=Server=postgres;Port=5432;Database=${POSTGRES_DB:-jobhunterdb};Username=${POSTGRES_USER:-admin};Password=${POSTGRES_PASSWORD:-password}
      - FileStorage__RootPath=/app/uploads/cvs
    ports:
      - "${BACKEND_PORT:-5290}:8080"
    volumes:
      - cv_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    build:
      context: ./ui.jobhunter
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.tapinti.com}
    ports:
      - "${UI_PORT:-8091}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  cv_uploads:
