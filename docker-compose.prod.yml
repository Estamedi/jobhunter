name: jobhunter

# Standalone production Compose file for VPS deploys.
# Prerequisite: shared_postgres container must be running on pg_network.
# Usage:
#   docker compose -f docker-compose.prod.yml up -d

services:

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/estamedi/jobhunter/backend:latest}
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__backend.jobhunterDb=Host=${POSTGRES_HOST:-shared_postgres};Port=5432;Database=${POSTGRES_DB:-jobhunterdb};Username=${POSTGRES_USER:-jobhunter_user};Password=${POSTGRES_PASSWORD}
      - Authentication__Google__ClientId=${AUTHENTICATION__GOOGLE__CLIENTID}
      - FileStorage__RootPath=/app/uploads/cvs
    ports:
      - "${BACKEND_PORT:-5290}:8080"
    volumes:
      - cv_uploads:/app/uploads
    networks:
      - default
      - pg_network
    labels:
      - "logging=promtail"
      - "com.docker.compose.project=jobhunter"
      - "com.docker.compose.service=backend"

  ui:
    image: ${UI_IMAGE:-ghcr.io/estamedi/jobhunter/ui:latest}
    restart: unless-stopped
    ports:
      - "${UI_PORT:-8091}:80"
    depends_on:
      - backend
    labels:
      - "logging=promtail"
      - "com.docker.compose.project=jobhunter"
      - "com.docker.compose.service=ui"

volumes:
  cv_uploads:

networks:
  pg_network:
    external: true
    name: pg_network
