name: jobhunter

# Standalone production Compose file for VPS deploys.
# Usage:
#   docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-jobhunterdb}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-jobhunterdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    labels:
      - "logging=promtail"
      - "com.docker.compose.project=jobhunter"
      - "com.docker.compose.service=postgres"

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/estamedi/jobhunter/backend:latest}
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__backend.jobhunterDb=Server=postgres;Port=5432;Database=${POSTGRES_DB:-jobhunterdb};Username=${POSTGRES_USER:-admin};Password=${POSTGRES_PASSWORD:-password}
    ports:
      - "${BACKEND_PORT:-5290}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "logging=promtail"
      - "com.docker.compose.project=jobhunter"
      - "com.docker.compose.service=backend"

  ui:
    image: ${UI_IMAGE:-ghcr.io/estamedi/jobhunter/ui:latest}
    restart: unless-stopped
    ports:
      - "${UI_PORT:-8091}:80"
    depends_on:
      - backend
    labels:
      - "logging=promtail"
      - "com.docker.compose.project=jobhunter"
      - "com.docker.compose.service=ui"

volumes:
  postgres_data:
