<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/images/favicon.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/images/favicon_light.svg"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/images/favicon.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/images/favicon_light.png"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Tapinti</title>
    <meta name="title" content="Tapinti" />
    <meta
      name="description"
      content="Personal Career CRM — organize your job search, applications, and interviews in one place."
    />
    <meta name="application-name" content="Tapinti" />
    <link rel="canonical" href="https://app.tapinti.com/" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://app.tapinti.com/" />
    <meta property="og:site_name" content="Tapinti" />
    <meta property="og:title" content="Tapinti" />
    <meta
      property="og:description"
      content="Personal Career CRM — organize your job search, applications, and interviews in one place."
    />
    <meta
      property="og:image"
      content="https://app.tapinti.com/images/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Tapinti — Personal Career CRM dashboard"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://app.tapinti.com/" />
    <meta name="twitter:title" content="Tapinti" />
    <meta
      name="twitter:description"
      content="Personal Career CRM — organize your job search, applications, and interviews in one place."
    />
    <meta
      name="twitter:image"
      content="https://app.tapinti.com/images/og-image.png"
    />
    <meta
      name="twitter:image:alt"
      content="Tapinti — Personal Career CRM dashboard"
    />

    <!-- font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />

    <meta name="theme-color" content="#7f22fe" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
